poll_interval_seconds = 30
reconciliation_interval_seconds = 60  # re-issue cover command to prevent 300s auto-stop
manual_override_minutes = 15

# Webhook server for Shelly devices (humidity + switch inputs via /webhook/shelly)
# See README.md for webhook setup instructions
webhook_port = 8090
# sensor_cache_path = "/dev/shm/home-ventilation-sensor-cache.json"  # default: ramdisk
humidity_stale_minutes = 120  # ignore readings older than this

[thresholds]
co2_low = 800
co2_high = 1200
humidity_low = 60.0
humidity_high = 70.0

[homebridge]
host = "192.168.1.1"
port = 8581
# credentials in .env: HOMEBRIDGE_USERNAME, HOMEBRIDGE_PASSWORD

[fans.master_bathroom]
shelly_host = "192.168.1.120"
co2_accessories = ["Master Bedroom CO2"]
humidity_accessories = ["Master Bathroom Humidity"]
humidity_sensor_ips = ["10.0.0.50"]  # Shelly H&T Gen3 IPs (identified by source IP)
switch_inputs = [0]

# Optional: run fan on a periodic schedule (e.g. nighttime ventilation)
[fans.master_bathroom.schedule]
start_hour = 22       # schedule active from 22:00...
end_hour = 7          # ...until 07:00
run_minutes = 10      # run first 10 minutes of each hour
speed = "low"         # "low" or "high"

[fans.toilet]
shelly_host = "192.168.1.121"
co2_accessories = ["Kids Bedroom 1 CO2", "Kids Bedroom 2 CO2"]
humidity_accessories = ["Kids Bathroom Humidity", "Toilet Humidity"]
switch_inputs = [0, 1]
