poll_interval_seconds = 30
reconciliation_interval_seconds = 60  # re-issue cover command to prevent 300s auto-stop
manual_override_minutes = 15
webhook_host = "192.168.1.1"  # daemon IP for Shelly webhook URLs
webhook_port = 8090
# sensor_cache_path = "/dev/shm/home-ventilation-sensor-cache.json"  # default: ramdisk
humidity_stale_minutes = 120  # ignore readings older than this

[thresholds]
co2_low = 800
co2_high = 1200
humidity_low = 60.0
humidity_high = 70.0
co2_hysteresis = 50        # ppm dead band to prevent toggling near threshold
humidity_hysteresis = 3.0  # % dead band to prevent toggling near threshold

[fans.master_bathroom]
shelly_host = "192.168.1.120"
humidity_sensor_ips = ["192.168.1.150"]  # Shelly H&T Gen3 IPs (identified by source IP)
switch_inputs = [0]

# Tuya CO2 sensors (local API, no cloud dependency)
# Get device_id + local_key from Tuya IoT Developer Platform (iot.tuya.com)
[fans.master_bathroom.co2_sensors.master_bedroom]
device_id = "abc123def456"
ip = "192.168.1.160"
local_key = "your_local_key"

[fans.master_bathroom.co2_sensors.living_room]
device_id = "def456ghi789"
ip = "192.168.1.161"
local_key = "your_local_key"

# Optional: nighttime schedule and/or speed cap
[fans.master_bathroom.schedule]
start_hour = 22       # schedule active from 22:00...
end_hour = 7          # ...until 07:00
run_minutes = 10      # run first 10 minutes of each hour (0 = no periodic runs)
speed = "low"         # "low" or "high"
max_speed = "low"     # cap sensor-driven speed during this window (switch override bypasses)

[fans.toilet]
shelly_host = "192.168.1.121"
switch_inputs = [0, 1]

[fans.toilet.co2_sensors.kids_bedroom_1]
device_id = "ghi789jkl012"
ip = "192.168.1.162"
local_key = "your_local_key"
